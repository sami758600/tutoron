<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Tutoron AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
<div class="auth-card">
    <h1>Create Account</h1>
    <p class="auth-sub">Create your account to save progress per user.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" class="stack-form auth-form">
        <input name="username" type="text" placeholder="Username (min 3 chars)" required>
        <input name="password" type="password" placeholder="Password (min 6 chars)" required>
        <button type="submit">Register</button>
    </form>

    <p class="auth-link">Already have an account? <a href="{{ url_for('login_page') }}">Login</a></p>
</div>
</body>
</html>
